<html>

<head>
<meta http-equiv="Content-Type" content="text/html; charset=gb2312">
<title>多方面计算工具</title>
</head>

<body>
    <table style="border-collapse: collapse;" border="1">
        <tbody>
            <tr>
                <td>方面1</td>
                <td><input id="jcdp1"></td>
                <td>方面11</td>
                <td><input id="jcdp11"></td>
            </tr>
            <tr>
                <td>方面2</td>
                <td><input id="jcdp2"></td>
                <td>方面12</td>
                <td><input id="jcdp12"></td>
            </tr>
            <tr>
                <td>方面3</td>
                <td><input id="jcdp3"></td>
                <td>方面13</td>
                <td><input id="jcdp13"></td>
            </tr>
            <tr>
                <td>方面4</td>
                <td><input id="jcdp4"></td>
                <td>方面14</td>
                <td><input id="jcdp14"></td>
            </tr>
            <tr>
                <td>方面5</td>
                <td><input id="jcdp5"></td>
                <td>方面15</td>
                <td><input id="jcdp15"></td>
            </tr>
            <tr>
                <td>方面6</td>
                <td><input id="jcdp6"></td>
                <td>方面16</td>
                <td><input id="jcdp16"></td>
            </tr>
            <tr>
                <td>方面7</td>
                <td><input id="jcdp7"></td>
                <td>方面17</td>
                <td><input id="jcdp17"></td>
            </tr>
            <tr>
                <td>方面8</td>
                <td><input id="jcdp8"></td>
                <td>方面18</td>
                <td><input id="jcdp18"></td>
            </tr>
            <tr>
                <td>方面9</td>
                <td><input id="jcdp9"></td>
                <td>方面19</td>
                <td><input id="jcdp19"></td>
            </tr>
            <tr>
                <td>方面10</td>
                <td><input id="jcdp10"></td>
                <td>方面20</td>
                <td><input id="jcdp20"></td>
            </tr>
            <tr>
                <td>切换频次</td>
                <td>
				<select id="pinci">
<option selected="selected" value="一轮">一轮</option>
<option value="一场景">一场景</option>
<option value="一小时">一小时</option>
<option value="一日">一日</option>
<option value="一影片">一影片</option>
<!--<option value="ELSE">其余复合动作不支持</option>-->
</select>
</td>
                <td>对应权值</td>
                <td><input id="xzqz" readonly="true"/></td>
            </tr>
            <tr>
                <td>结果</td>
                <td><input id="jieguo" readonly="true"></td>
            </tr>

    
        </tbody>
    </table>
    <input onclick="compute()" type="button" value="点击此处进行计算">(每次修改数据后都要点击此处进行运算)

    <script>
        var JCDP1 = document.getElementById('jcdp1');
        var JCDP2 = document.getElementById('jcdp2');
        var JCDP3 = document.getElementById('jcdp3');
        var JCDP4 = document.getElementById('jcdp4');
        var JCDP5 = document.getElementById('jcdp5');
        var JCDP6 = document.getElementById('jcdp6');
        var JCDP7 = document.getElementById('jcdp7');
        var JCDP8 = document.getElementById('jcdp8');
        var JCDP9 = document.getElementById('jcdp9');
        var JCDP10 = document.getElementById('jcdp10');
        var JCDP11 = document.getElementById('jcdp11');
        var JCDP12 = document.getElementById('jcdp12');
        var JCDP13 = document.getElementById('jcdp13');
        var JCDP14 = document.getElementById('jcdp14');
        var JCDP15 = document.getElementById('jcdp15');
        var JCDP16 = document.getElementById('jcdp16');
        var JCDP17 = document.getElementById('jcdp17');
        var JCDP18 = document.getElementById('jcdp18');
        var JCDP19 = document.getElementById('jcdp19');
        var JCDP20 = document.getElementById('jcdp20');
        var JIEGUO = document.getElementById('jieguo');
        var PINCI = document.getElementById('pinci');
        var XZQZ = document.getElementById('xzqz');
		
        function compute(){
			var arr1 = [JCDP1,JCDP2,JCDP3,JCDP4,JCDP5,JCDP6,JCDP7,JCDP8,JCDP9,JCDP10,JCDP11,JCDP12,JCDP13,JCDP14,JCDP15,JCDP16,JCDP17,JCDP18,JCDP19,JCDP20];
			var arr2 = [];
			var arr3 = [1,0.5,0.5,0.5,0.25,0.25,0.25,0.125,0.125,0.125,0.0625,0.0625,0.0625,0.03125,0.03125,0.03125,0.015625,0.015625,0.015625,0.0078125];
			var i = 0;
			
			// 设置XZQZ值
			if(PINCI.value == "一轮"){
				XZQZ.value = 0;
			}
			else if(PINCI.value == "一场景"){
				XZQZ.value = 0.1;
			} 
			else if(PINCI.value == "一小时"){
				XZQZ.value = 0.25;
			} 
			else if(PINCI.value == "一日"){
				XZQZ.value = 0.5;
			} 
			else if(PINCI.value == "一影片"){
				XZQZ.value = 1;
			} 
			
			// 读取输入值到arr2
			for(i = 0; i < 20; i++) {
				arr2.push(parseFloat(arr1[i].value.length == 0 ? 0 : arr1[i].value));
			}
			
			// 降序排序
			arr2.sort(function(a, b) { return a < b ? 1 : -1; });
			
			// 计算修正系数 (1 + XZQZ)，确保是浮点数
			var factor = parseFloat(1.0) + parseFloat(XZQZ.value);
			
			var re = 0;
			for(i = 0; i < 20; i++) {
				arr1[i].value = arr2[i];
				
				var weightedValue = parseFloat(arr2[i]) * parseFloat(arr3[i]);
				
				// 最大的一项（i=0）不除以factor，其余项都除以factor
				if(i == 0) {
					re = re + weightedValue;
				} else {
					re = re + weightedValue / factor;
				}
			}
			
			JIEGUO.value = re;
		}
    </script>


</body>

</html>

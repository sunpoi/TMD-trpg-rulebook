<H2>算术平均值在线计算器</H2>
<P>在下框内输入数字，使用半角英文符号分割。</P></DIV>
<DIV class=bd style="HEIGHT: auto !important">
<DIV class="mod_box_t3 fn_box">
<DIV class=box_con>
<DIV class=mathmod_form>
<SCRIPT type=text/javascript>
function calculate() {
	var x = document.getElementById("inputs").value;
	x=x.replace(' ','');
	var arr=x.split(',');
	
	var lcm=0;
	var flag=false;
	var total=0;
	for(var j=0;j<arr.length;j++){
		arr[j]=parseFloat(arr[j]);
		total+=arr[j];
	}
	var mean=total/arr.length;
	mean=Math.round(mean*10000)/10000;
	document.getElementById("res_area").style.visibility = "visible";
	document.getElementById("result1").value = arr.length;
	document.getElementById("result2").value = mean;
}
</SCRIPT>

<TABLE style="WIDTH: 100%; MARGIN: 0px">
  <TBODY>
  <TR>
    <TD vAlign=top><LABEL><BR></LABEL></TD>
    <TD>
      <P align=left><LABEL><TEXTAREA id=inputs style="HEIGHT: 60px; WIDTH: 283px" rows=3 cols=5>5,20,40,80,100</TEXTAREA></LABEL></P></TD></TR>
  <TR>
    <TD colSpan=2 align=center>
      <P align=left><INPUT onclick=calculate() id=button class=calc type=button value=计算>输入完成后点击计算即可</P></TD>

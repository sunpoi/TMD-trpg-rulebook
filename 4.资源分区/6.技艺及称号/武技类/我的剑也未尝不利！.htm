<DIV id=nstext><P><FONT size=2>我的剑也未尝不利！
<BR>500
<BR>施展此技艺必须使用剑类武器。
<BR>在战斗场景中，若与你敌对的目标说出“尔等是要试试我的宝剑锋利吗？”或类似的话时（即炫耀武力/威胁使用此技艺的角色，若说出此话的敌人被胁迫或因其他非自愿原因说出，则此技艺不能发动），你可以立即以一个自由动作拔出佩戴的武器，并回击“我的剑也未尝不利！”，在接下来的一轮中，你的武器将额外获得2点破甲。
<BR>若你的武器已被拔出且握在手中，则改为获得2点破甲和2点攻击检定上的表现加值。

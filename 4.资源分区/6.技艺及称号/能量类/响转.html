<h1 class="dtH1">响转</h1></div></div>
<div id="nstext">
<p><font size="2">响转&nbsp;（差价升级）<br/>
移动技<br/>
购买要求：持有灵力能量池<br/>
C+1000&#x2F;B+2000<br/>
【响转】与死神的【瞬步】以及灭却师的【飞镰脚】对应，是破面拥有的一种高级步法，但是并不是所有的破面都精于响转，这是因为响转和瞬步的不同之处的其中一点，就在于响转能一定开发破面的神经系统防止偷袭。<br/>
你现在获得了飞行能力，从外表上看为你站在了空中，但是实际上是你的灵力将你托再空中，机动性为普通&#x2F;完美.<br/>
并且你现在获得了B&#x2F;A级免疫措手不及的能力。</p><p></font></p>

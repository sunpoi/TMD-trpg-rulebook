<p><font size="2">三刀流口技<br/>
技艺<br/>
魔幻本质<br/>
1000<br/>
如何将3把武器同时握持，既然双手已经各持一把，那就用嘴吧！<br/>
咬住武器！：经受了TMD主神口部咬合力的训练后，你现在可以用嘴如同一只手一样持有一把武器，但是持有武器的力量要求不能大于你力量属性的1/2。<br/>
但同时你仍能正常的说话。<br/>
咬技：比起多拿一把武器，觉得咬人很正常的轮回者可以选择将该技艺的效果永久变为以口部发动的天生武器攻击获得1点附加成功与1dp士气加值。</font></p>

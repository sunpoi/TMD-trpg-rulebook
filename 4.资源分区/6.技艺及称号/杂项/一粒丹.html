<p><font size="2">名称：一粒丹<br/>
价格：D+500<br/>
本质：特异本质<br/>
效果：<br/>
当你在一个场景中，无论主动或者被动，第一次使用任何“药物”时，<br/>
你获得【怒疯】直到你离开该场景。但是当你在【怒疯】持续时间内，<br/>
第二次无论主动或被动使用任何药物时，移除你已经获得的【怒疯】</p><p>【怒疯】<br/>
描述：你们这是自寻死路！<br/>
效果：你的攻击获得1dp士气加值，你的攻击获得法破，你获得狂怒1</p><p></font></p>

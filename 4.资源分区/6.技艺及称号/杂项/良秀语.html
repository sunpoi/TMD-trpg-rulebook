<H1 class=dtH1>良秀语</H1></DIV></DIV>
<DIV id=nstext><BR>
<P><FONT size=2>良秀语
<BR>500
<BR>
<BR>良秀语是一种极其省略的语言，将一整句话省略为几个字，中间使用符号连接。例：玩家恶魔购买了良秀语，他希望使用这门语言表达“虽然已经吃过饭了，但他还是很饿。”，则可以省略为“食・仍・饿”
<BR>一般而言，良秀语无法被听懂，这意味着在进行沟通时，良秀语可以起到保密作用。若在学识技能上具有至少1级良秀语等级，则可以正常听懂，无论是否存在语言沟通障碍。
<BR>在使用良秀语进行社交检定时，始终会承受2点检定上的表现减值。

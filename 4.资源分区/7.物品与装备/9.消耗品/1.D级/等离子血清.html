<br>
<br>D+500/3管
<br>在钴协议中，研究人员为劣势一方实验体发放的道具。这种血清通过针筒注入静脉，随后会激活实验体的细胞活性，并且让实验体能从所伤害的敌方实验体身上掠夺VF（生命）能量以恢复自身。

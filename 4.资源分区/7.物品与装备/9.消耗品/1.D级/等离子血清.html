<p><font size="2">消耗品名称：等离子血清<br/>
资源分类：消耗品<br/>
本质：科技本质<br/>
价格：D+500/3管</p><p>描述：<br/>
在钴协议中，研究人员为劣势一方实验体发放的道具。这种血清通过针筒注入静脉，随后会激活实验体的细胞活性，并且让实验体能从所伤害的敌方实验体身上掠夺VF（生命）能量以恢复自身。</p><p>效果：<br/>
注射后一日内，你的近战攻击上获得2点吸血、移动速度提升20米，并在因长途移动而进行强韧检定时获得6dp增强加值。</font></p>

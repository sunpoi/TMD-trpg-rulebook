<h1 class="dtH1">守护之印</h1></div></div>
<div id="nstext">
<p><font size="2">消耗品名称：守护之印<br/>
资源分类：消耗品<br/>
本质：魔幻本质<br/>
价格：D+500</p><p>描述：<br/>
用法术凝聚而成的丝线编制而成的实体印记，为法师提供珍贵的生命保障。</p><p>效果：<br/>
该奇物无需占据装备位，当完好被严重填满时自动开始生效，接下来你受到攻击时，将其中【传奇互动属性之和+1】点伤害降低一级（冲击-严重-韧性） ，该效果持续一场景或是重新具有完好。<br/>
每次生效时，守护之印都会变得更加黯淡，直到生效次数达到3次时，守护之印将会彻底失效。</font></p>

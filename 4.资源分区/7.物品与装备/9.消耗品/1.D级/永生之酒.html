<p><font size="2">消耗品名称：永生之酒<br/>
资源分类：消耗品<br/>
本质：神话本质<br/>
价格：D+500</p><p>描述：<br/>
一杯璀璨的黄金之酒，本应是只有诸神才能享受的永生之物。若被凡人饮下，其将不会再被寿命所困，无拘亦无束。</p><p>效果：<br/>
饮下后，你获得【不老】；你免疫不超过B级衰老来源的效果；你免疫不超过B级【耗竭】来源的效果。</font></p>

<h1 class="dtH1">2. 强体丹（异变）</h1></div></div>
<div id="nstext">
<p><font size="2">消耗品名称：强体丹（异变）<br/>
资源分类：消耗品<br/>
本质：魔幻本质<br/>
价格：D+500<br/>
数量：5颗<br/>
生效轮次：持续传奇耐力轮/场景结束取低</p><p>描述：<br/>
体修入门时服用的丹药，是强骨丹的异变版本，可以暂时增强其肉体强度，中幅增加自身的对抗能力。</p><p>效果：<br/>
在强韧豁免上获得耐力属性等级1点加值和B级毒素免疫。</p><p>修仙世界效果：在强韧豁免上获得耐力属性等级*2点加值和B级毒素免疫。</font></p>

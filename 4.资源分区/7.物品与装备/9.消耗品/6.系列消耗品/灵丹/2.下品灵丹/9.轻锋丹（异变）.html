<h1 class="dtH1">9.轻锋丹（异变）</h1></div></div>
<div id="nstext">
<p><font size="2">轻锋丹（异变）<br/>
数量：5颗<br/>
描述：来去如风，锋芒毕露，能够中幅提高服用者的反应速度，并可以更好的适应各种环境带来的影响，是轻风丹的异变版本。<br/>
生效轮次：持续传奇敏捷*轮/场景结束取低<br/>
效果：在反射豁免上获得敏捷属性等级*1点加值和B级环境免疫。<br/>
修仙世界效果：在反射豁免上获得敏捷属性等级*2点加值和B级环境免疫。</font></p>

<h1 class="dtH1">3. 迷情丹</h1></div></div>
<div id="nstext">
<p><font size="2">消耗品名称：迷情丹<br/>
资源分类：消耗品<br/>
本质：魔幻本质<br/>
价格：D+500<br/>
数量：5颗<br/>
生效轮次：立即</p><p>描述：<br/>
修仙世界给喜欢的女修下药自然不能下普通的药物，毕竟对修仙者也没啥用，所以就有了迷情丹。<br/>
特殊的，这个资源被视为粉红书资源，只是因为方便整合而放在这。</p><p>效果：<br/>
使服用者产生情欲，承受10点不可豁免的魅惑，对象为最近最符合服用者审美与取向的单位或使其服用丹药的单位。</p><p>修仙世界效果：无特殊效果。</font></p>

<h1 class="dtH1">12.清神丹</h1></div></div>
<div id="nstext">
<p><font size="2">清神丹<br/>
D+500<br/>
数量：5颗<br/>
描述：清除心魔业障，安定神魂，清神丹可以有效的增强使用者的意志，使其更加坚定。<br/>
生效轮次：持续传奇决心*轮/场景结束取低<br/>
效果：消耗意志力以获得无名防御时，则额外再获得等同于传奇决心*1点无名防御，再获得1点仅能用于治疗情绪异常点数的异常点治疗（医疗点24）。<br/>
修仙世界效果：持续时间提升至（传奇决心+1）*轮。</font></p>

<h1 class="dtH1">6.大全丹</h1></div></div>
<div id="nstext">
<p><font size="2">大全丹<br/>
D+500<br/>
数量：3颗<br/>
描述：可以使服用者的反应力、免疫力、意志力在短期内都得到提升，但受到服用者的根骨以及天赋限制。<br/>
生效轮次：使用者的传奇决心*轮/传奇敏捷*轮/传奇耐力*轮/场景结束取低<br/>
效果：在持续时间内，进行的所有意志/强韧/反射豁免均获得决心/耐力/敏捷（一一对应）上的附加成功*2点检定上的附加成功。<br/>
修仙世界效果：持续时间提升至（传奇决心+1）*轮。</font></p>

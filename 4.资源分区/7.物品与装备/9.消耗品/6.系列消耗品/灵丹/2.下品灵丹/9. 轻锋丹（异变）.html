<h1 class="dtH1">9. 轻锋丹（异变）</h1></div></div>
<div id="nstext">
<p><font size="2">消耗品名称：轻锋丹（异变）<br/>
资源分类：消耗品<br/>
本质：魔幻本质<br/>
价格：D+500<br/>
数量：5颗<br/>
生效轮次：持续传奇敏捷轮/场景结束取低</p><p>描述：<br/>
来去如风，锋芒毕露，能够中幅提高服用者的反应速度，并可以更好的适应各种环境带来的影响，是轻风丹的异变版本。</p><p>效果：<br/>
在服用后，在反射豁免上获得敏捷属性等级1点加值和B级环境免疫。</p><p>修仙世界效果：在反射豁免上获得敏捷属性等级*2点加值和B级环境免疫。</font></p>

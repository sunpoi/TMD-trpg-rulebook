<div id="nstext">
<p><font size="2">愈体丹<br/>
D+500<br/>
数量：3颗<br/>
描述：可以治疗修士的伤势，不是毁坏神识的伤势都能通过愈体丹快速疗伤。<br/>
生效轮次：立即<br/>
效果：使服用者快速自愈，一刻钟（十五分钟）后，愈体丹药效生效，一次性恢复15点完好，如有肢体残缺或内脏缺失，在此时一并长出，这视为一个B级的免疫创伤效果。<br/>
修仙世界效果：愈体丹的药效生效时间缩短至半刻钟（七分半）。</font></p>

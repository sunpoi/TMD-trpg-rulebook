<div id="nstext">
<p><font size="2">轻风丹<br/>
D+500<br/>
数量：5颗<br/>
描述：来去如风，身轻似鹤，能够提高服用者的反应速度，并可以适应各种环境带来的影响。<br/>
生效轮次：持续传奇敏捷*轮/场景结束取低<br/>
效果：在反射豁免上获得敏捷上的附加成功*3点加值和C级环境免疫。<br/>
修仙世界效果：在反射豁免上获得敏捷上的附加成功*5点加值和C级环境免疫。</font></p>

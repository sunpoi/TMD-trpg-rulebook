<p><font size="2">迷情丹<br/>
D+500<br/>
数量：5颗<br/>
描述：修仙世界给喜欢的女修下药自然不能下普通的药物，毕竟对修仙者也没啥用，所以就有了迷情丹。<br/>
生效轮次：立即<br/>
生效轮次：使服用者产生情欲，承受10点不可豁免的魅惑，对象为最近最符合服用者审美与取向的单位或使其服用丹药的单位。<br/>
修仙世界效果：无特殊效果。<br/>
特殊的，这个资源被视为粉红书资源，只是因为方便整合而放在这。</font></p>

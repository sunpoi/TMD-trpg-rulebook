<h1 class="dtH1">6. 大全丹</h1></div></div>
<div id="nstext">
<p><font size="2">消耗品名称：大全丹<br/>
资源分类：消耗品<br/>
本质：魔幻本质<br/>
价格：D+500<br/>
数量：3颗<br/>
生效轮次：使用者的传奇决心轮/传奇敏捷轮/传奇耐力轮/场景结束取低。</p><p>描述：<br/>
可以使服用者的反应力、免疫力、意志力在短期内都得到提升，但受到服用者的根骨以及天赋限制。</p><p>效果：<br/>
在持续时间内，进行的所有意志/强韧/反射豁免均获得决心/耐力/敏捷（一一对应）附加成功2点检定上的附加成功。</p><p>修仙世界效果：持续时间提升至（传奇决心+1）*轮。</font></p>

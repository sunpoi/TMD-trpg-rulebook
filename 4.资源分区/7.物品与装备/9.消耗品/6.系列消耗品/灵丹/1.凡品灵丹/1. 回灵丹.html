<div id="nstext">
<p><font size="2">消耗品名称：回灵丹<br/>
资源分类：消耗品<br/>
本质：魔幻本质<br/>
价格：500分<br/>
数量：1颗<br/>
生效轮次：使用者的传奇耐力轮/场景结束取低</p><p>描述：<br/>
修仙世界中最基础的，用于恢复灵气以便继续行动的丹药，价格低廉，品质粗劣。</p><p>效果：<br/>
每轮开始时恢复1点通用东方能量池。 </p><p>修仙世界效果：生效轮次改为使用者的（传奇耐力+1）轮。</font></p>

<p><font size="2">消耗品名称：伤药<br/>
资源分类：消耗品<br/>
本质：科技本质<br/>
价格：500分</p><p>描述：<br/>
购买者可以购买效果相同的变种。例：原素瓶、核子可乐、红药水、急救药。</p><p>效果：<br/>
九颗装的小药瓶，在吞服一颗药后的两分四十秒内缓慢恢复使用者12点伤势。<br/>
药物疲劳：<br/>
一档：恢复9点伤势<br/>
二档：恢复6点伤势<br/>
三档：恢复3点伤势<br/>
四档：没有任何作用</font></p>

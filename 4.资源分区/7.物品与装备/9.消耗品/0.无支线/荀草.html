<DIV id=nstext><BR>
<P><FONT size=2>荀草
消耗品
<BR>《山海经》
<BR>青要之山...有草焉，其状如葌，而方茎黄华赤实，其本如藁本，名曰荀草，服之美人色。
<BR>200
<BR>效果：
<BR>荀草，或叫苞草，山海经中的草，菅似茅，方茎，黄花，赤色果，服之可以美容颜。
<BR>服下荀草，便可免疫所有不超过D支线的的肌肤疾病，并使相貌提升1点。

青要之山…有草焉，其状如葌，而方茎黄华赤实，其本如藁本，名曰荀草，服之美人色。<br/>
荀草，或叫苞草，山海经中的草，菅似茅，方茎，黄花，赤色果，服之可以美容颜。</p><p>效果：<br/>

<h1 class="dtH1">七星灯</h1></div></div>
<div id="nstext">
<p><font size="2">消耗品名称：七星灯<br/>
资源分类：消耗品<br/>
本质：神话本质<br/>
价格：500分</p><p>描述：<br/>
七盏锈迹斑斑的灯，若能摆为北斗星，点亮后主灯七日不灭，也许会发生一些奇迹吧。<br/>
“亮，再不能临阵讨贼。悠悠苍天，何薄于我……”</p><p>效果：<br/>
若寿命即将走到尽头，亲手点亮七星灯并且维持七日不灭，则可延寿若一纪(12年)。期间若是灯被任何原因熄灭，则立即受到反噬，寿尽而亡。</font></p>

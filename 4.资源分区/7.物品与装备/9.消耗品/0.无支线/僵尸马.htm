<H1 class=dtH1>僵尸马</H1></DIV></DIV>
<DIV id=nstext><BR>
<P><FONT size=2>僵尸马<BR>500<BR>这是一段如普通麻绳般的土黄色粗线，似乎并没有什么特别的。<BR>使用僵尸马需要再有一根针，但在购买时会贴心的再附赠一根，一段僵尸马可以用5次，缝合大型伤口，也可以用10次，缝合小型伤口。<BR>使用僵尸马时，根据需缝合伤口的大小需要5-15分钟，用针和线来缝合伤口，被缝合的区域将会视为自动符合长线治疗条件并自动进行长线治疗，还会在每次结算长线治疗时再治疗1点肢体妨碍，但无法享受其他与长线治疗同时生效带来的效果。<BR></FONT>
<HR></P></DIV>

<p><font size="2">生苔铁板<br/>
价格：D+1000<br/>
分类：轻盾<br/>
武器伤害：2L<br/>
武器特性：【格挡8】<br/>
武器体积：3<br/>
伤害类型：物理-钝击<br/>
描述：沾满有放松效果的苔藓的盾，放松神经能够增幅与自然的联系，积蓄魔力。<br/>
效果：当你本轮或者上一轮消耗了魔力，持有者在格挡时会同时恢复1点魔力/魔力变体，这一效果每轮只会生效一次，无法使相应能量池的恢复超过每日三倍上限。</font></p>

<p><font size="2">非洲投刃<br/>
价格：C+1500<br/>
分类：投掷武器（轻投）<br/>
武器伤害：11L<br/>
武器特性：高速2，回力<br/>
武器体积：2<br/>
速射等级：-<br/>
基础射程：检定属性*5米<br/>
伤害类型：物理-挥砍<br/>
描述：是曰：散发满满邪气的凶残武器。运用其上延伸而出的刀刃，进行多样化的攻击与投掷。<br/>
效果：当你使用该武器进行【召还】行为时，【召还】行为造成的伤害提升等同你【传奇敏捷】*1点数值，同时忽略1点伤害吸收类能力带来的影响。</font></p>

价格：C+2000<br/>
分类：电锯<br/>
武器伤害：12L<br/>
武器特性：重型武器，双手，威猛4<br/>
武器体积：4<br/>
伤害类型：物理-挥砍<br/>

效果：使用该武器进行攻击时，附带等同你【传奇力量-1】点肢体妨碍点数，不可豁免，可叠加；该武器虽然是电锯，但主神提供的版本无需供能，你可以正常进行使用。</font></p>

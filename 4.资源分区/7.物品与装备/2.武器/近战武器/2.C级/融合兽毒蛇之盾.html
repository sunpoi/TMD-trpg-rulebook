<DIV id=nstext><BR>
<P><FONT size=2>融合兽毒蛇之盾
<br>C+1000
<br>原典：盾之勇者成名录
<br>由矿洞深处奇美拉魔兽毒腺附加的盾牌，带给了持有者抗毒与施加毒素的能力。
<br>类型：轻盾
<br>武器伤害：6L
<br>体积：2
<br>专业：盾
<br>特性：【格挡8】
<br>剧毒耐性：持有者受到的毒素伤害减少3点
<br>形态转换：当持有者受到近战攻击时，可以反射动作支付3点魔力，将盾牌上的毒蛇活化，令攻击者受到2点不可豁免的毒素点数。

价格：C+2000<br/>
分类：剑<br/>
武器伤害：11L<br/>
武器特性：【轻灵】【破甲1】<br/>
武器体积：3<br/>
伤害类型：音波（震动）<br/>

效果：持有者可以使用一个迅捷动作激活武器能力，持续一场景；持续时间内，当使用该武器进行攻击时，在攻击检定上获得等同【敏捷属性】一半的速度加值，并在攻击上获得等同这些速度加值的【高速】。</font></p>

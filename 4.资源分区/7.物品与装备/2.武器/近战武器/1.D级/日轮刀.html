<p><font size="2">日轮刀<br/>
D+1000<br/>
魔幻本质<br/>
出自《鬼灭之刃》，由不断吸收太阳光的星星绯矿石和星星绯砂铁锻造而成的刀，具有太阳的威力。<br/>
锻造完第一个持剑的人会与日轮刀产生感应，使刀刃变色，当然我们亲爱的tmd主神决定由购买者自己决定刀刃所呈现的颜色。<br/>
武器类别：武士刀<br/>
专业：刀<br/>
武器伤害：9L<br/>
体积：3<br/>
伤害类型：挥砍<br/>
特性：高速1，【斩鬼】<br/>
斩鬼：这把武器对【黑暗生物】进行攻击时额外具有1点熔毁。<br/>
=====<br/>

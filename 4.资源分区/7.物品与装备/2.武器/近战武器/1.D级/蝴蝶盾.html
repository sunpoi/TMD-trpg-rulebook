<P><FONT size=2>蝴蝶盾
<br>D+500
<br>原典：盾之勇者成名录
<br>使用蝴蝶作为素材打造的盾牌，带给持有者抵抗麻痹麟粉的能力。
<br>类型：轻盾
<br>武器伤害：3L
<br>体积：2
<br>专业：盾
<br>特性：【格挡5】
<br>持有者承受的麻痹异常点数减少3点。
<br>以花招动作支付2点魔力，持有者在三轮内免疫C级别幻象来源的负面效果

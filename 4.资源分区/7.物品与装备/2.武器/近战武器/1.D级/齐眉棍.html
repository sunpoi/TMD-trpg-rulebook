<br>价格：D+500
<br>分类：长棍
<br>武器伤害：6L
<br>武器特性：【格挡2】【长柄】
<br>伤害类型：物理-钝击
<br>体积：3
<br>描述：这根长兵以白蜡杆制成，轻重合宜，粗有盈把，棍竖直与人眉高度齐，故得此名。
<br>齐眉：使用本武器施展棍类技艺时，防御上获得4DP的器械加值。

<P><FONT size=2>拟声怪影盾
<br>D+500
<br>原典：盾之勇者成名录
<br>形似蝙蝠的盾牌，带给持有者抵抗与放大音波的能力。
<br>类型：轻盾
<br>武器伤害：3L
<br>体积：2
<br>专业：盾
<br>特性：【格挡5】
<br>持有者受到的音波伤害减少3点。
<br>持有者在可花招动作支付1点魔力以让触及范围内的一个单位下一次使用音波攻击时获得攻击上的3点器械加值。

<p style="line-height: 1.5;"; line-height: 1.5;><font size="2">
刚剑灭光原力<br/>本质：魔幻本质<br/>价格：B+2000<br/>分类：重剑<br/>体积：4<br/>武器伤害：21L<br/>武器属性：【重型武器】【双手】<br/>描述：被誉为连光都能够斩灭的强力重剑，同时因为其为持有者带来的刚力而著名，虽然无法斩灭光芒，但斩点别的东西倒绰绰有余。<br/>刚剑：这把武器能够斩断大部分防护，视为具有等于持有者传奇力量*2的任意伤害减免忽略，同时在攻击时忽略这个数值一半的防御附加成功。<br/></font></p>

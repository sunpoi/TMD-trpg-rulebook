<h1 class="dtH1">轮椅</h1></div></div>
<div id="nstext">
<p><font size="2">轮椅<br/>
D+500<br/>
这是一款蕴含各种高科技的电动轮椅，即使只有4根手指也能正常使用。<br/>
轻型载具<br/>
移动速度 80M<br/>
防御面 6<br/>
结构 22<br/>
体积 5<br/>
电脑语音：这台轮椅配备一台电脑，并且具有播放语音的功能，意味着即使驾驶者无法说话也能用这台电脑发声，这是一个B级沉默免疫能力。<br/>
物理资源：电脑的数据库里不知道为什么有很多物理学的高精尖科技资料，也许是上任使用者留下来的，这些资料的辅助让驾驶员在使用物理派系法术时获得传奇智力*2的器械加值。</font></p>

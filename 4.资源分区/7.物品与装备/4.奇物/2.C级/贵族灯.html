<DIV id=nstext><BR>
<P><FONT size=2>贵族灯
<BR>C+1000
<BR>一个闪闪发光，金色底座和半球形钻石外壳的灯，你可以贴在身体的任何部位，在解决照明问题的同时彰显你奢华的身份。需要注意的是，金色底座严禁刮擦，刮出金漆下面的塑料，或者把我们宣称的钻石外壳敲出玻璃碎片，就不在保修范围内了。
<BR>功能：贴在身上，打开开关，亮灯，所有人即使身处一片漆黑的地方也能如在太阳下一般明亮。翻译成人话就是，贵族灯周围的100米范围内，亮度等级提升3级<P>

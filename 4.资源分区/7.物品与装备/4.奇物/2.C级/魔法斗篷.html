<h1 class="dtH1">魔法斗篷</h1></div></div>
<div id="nstext">
<p><font size="2">奇物名称：魔法斗篷<br/>
资源分类：奇物<br/>
本质：魔幻本质<br/>
价格：C+1000</p><p>描述：<br/>
拥有魔法耐性的极薄外套。形状会产生空气层、能够吸收殴打带来的冲击。</p><p>效果：<br/>
占据斗篷位。</p><p>【魔法耐性】：穿戴者在受到法术攻击时，额外获得1个基于偏斜防御的防御附加成功，同时攻击者会在攻击检定上承受【劣化1】，基于偏斜防御。</p><p>【抗冲击】：穿戴者免疫冲击点数带来的减值，并获得偏斜防御6，与基于偏斜防御的DR1/-。</font></p>

<P><FONT size=2>奥术协同王冠
<br>
<br>D+500
<br>占据头盔位
<br>―由一百种异界宝石制成的饰环闪烁着微光。
<br>
<br>穿戴者在使用消耗魔力的、动作至少为迅捷动作的能力施加具有持续时间的状态*时，在1轮内获得【奥术协同】。
<br>
<br>奥术协同：具有此状态的单位在以近战、远程武器进行攻击时，在命中后附带施法主属性的附加成功点同类型伤害。
<br>
<br>具有持续时间的状态：对友方提供增益的效果或者是令敌方承受减益的负面效果，只要其具有一个持续时间，即可满足这一条件。

<div id="nstext">
<p><font size="2">名称：拒绝死亡的项链<br/>
类别：奇物（饰品位）<br/>
本质：特异本质<br/>
价格：B+3000<br/>
描述：<br/>
通过抑制心灵的高昂、能够回避死亡的纯银项链。某位冒险者从「母亲」处得到、但之后抛弃了。<br/>
效果：<br/>
每七日一次，当一次攻击会将你杀死时，你将免疫那次伤害，这是一个B级命运来源的【无敌】效果。<br/>
</font></p>

<p><font size="2">名称：除你武器 Expelliarmus<br/>
价格：C+1000<br/>
类型：攻击技<br/>
等级：C<br/>
派系：咒击<br/>
消耗：6<br/>
成分：语言，姿态<br/>
动作：标准<br/>
射程：15M<br/>
目标：单体<br/>
持续：一轮<br/>
魔法界在现代决斗中常用的缴械魔咒<br/>
效果：<br/>
每轮仅可使用一次，以一个标准动作使用，对射程内的敌人进行一次施法攻击，该次施法攻击将附带击落武器的效果，且如果施法者的先攻高于目标，该次攻击将额外具有B级措手不及效果。</p><p></font></p>

<div id="nstext">
<p><font size="2">名称：吸血鬼之触<br/>
价格：B+2000<br/>
类型：增强技<br/>
等级：B<br/>
派系：无派系<br/>
消耗：10<br/>
成分：语言，姿态<br/>
动作：移动<br/>
射程：-<br/>
目标：自身<br/>
持续：一场景<br/>
描述：<br/>
吸血鬼的进食是令人恐惧的，吸取生命力，穿透猎物皮肤的攻击，而通过魔法理论，将其变为一种可施加的吸取生命的法术特质，实际上可行。<br/>
效果：<br/>
唤来血雾将你身体与法杖包裹，在接下来一场景内你的施法攻击获得【接触攻击】特性，且额外【施法技能等级/2】点吸血。</p><p></font></p>

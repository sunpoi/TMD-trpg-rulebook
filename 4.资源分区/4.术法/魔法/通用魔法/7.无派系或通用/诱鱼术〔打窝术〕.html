<div id="nstext">
<p><font size="2">诱鱼术〔打窝术〕<br/>
250<br/>
派系：无派系&nbsp;<br/>
等级：-&nbsp;<br/>
花费：0<br/>
成分：言语&nbsp;<br/>
动作：标准&nbsp;<br/>
射程：特殊&nbsp;<br/>
目标：见描述<br/>
持续：一个小时&nbsp;<br/>
对抗：无&nbsp;</p><p>召唤鱼类聚集到施法者的位置。施法者必须准备鱼饵（掺入施法者的血液），并将它投入大海（或者开放水域），同时吟唱咒语。1&nbsp;小时之内，将有&nbsp;1D100&nbsp;条无支线本地鱼种的鱼聚集过来（但不代表你可以钓起来这么多），但鱼不一定会因此而主动吃钩。<br/>
</font></p>

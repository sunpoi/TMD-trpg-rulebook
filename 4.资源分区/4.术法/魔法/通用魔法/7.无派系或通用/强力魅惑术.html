<div id="nstext">
<p><font size="2">名称：强力魅惑术<br/>
类型：攻击技 <br/>
价格：D+500<br/>
派系：无<br/>
花费：2魔力<br/>
成分：动作 <br/>
动作：标准 <br/>
射程：15米 <br/>
效果：单体 <br/>
持续：立即<br/>
效果：该法术有两种用法，施法前选择其一：<br/>
①对范围内可视目标使用进行一次施法攻击检定，该次检定有额外1点附加成功同时不造成伤害而是转为等量的魅惑点数，正常豁免。<br/>
②对范围内可视目标使用进行一次施法攻击检定，该次攻击额外获得4点内在加值并且转为精神伤害。<br/>
</font></p>

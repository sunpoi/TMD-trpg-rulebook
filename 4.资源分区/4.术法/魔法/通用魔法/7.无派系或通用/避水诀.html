<p><font size="2">避水诀<br/>
D+500<br/>
“行者即驾云，径至西洋大海，按筋斗，捻了避水诀，分开波浪。.........好猴王，跳至桥头，使一个闭水法，捻着诀，扑的钻入波中，分开水路，径入东洋海底。”<br/>
类型：增强技<br/>
等级：D<br/>
派系：无<br/>
花费：2<br/>
成分：动作<br/>
动作：自由<br/>
目标：自身<br/>
持续：一轮<br/>
效果：<br/>
使用该技艺需要至少有一只肢体未持有武器且能使用，以一个自由动作消耗2点能量使用，获得B级及以下潮湿的免疫，持续一轮。</font></p>

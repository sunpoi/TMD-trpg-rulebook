<div id="nstext">
<p><font size="2">“长日尽处，<br/>
我站在你面前。<br/>
你将看到我的伤疤，<br/>
知道我曾受伤，<br/>
也曾痊愈。”</p>
<br><IMG src="新世短歌.jpg">
<p>TMD：新世短歌（New Tanka）终于完成了它的历史使命，并于今日盖棺定论。或许还有很多歌未唱完，或许明天在明天就会到来。但无论如何，请满怀期待，The brave new world，What a wonderful world.<br/>
